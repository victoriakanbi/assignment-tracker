<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Assignment Tracker</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <!-- SortableJS for mobile-friendly drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    
    <style>
        :root {
            --bg: #F8FAFC; --surface: #FFFFFF; --primary: #4F46E5; 
            --primary-hover: #4338CA; --text-main: #0F172A; --text-sub: #64748B;
            --border: #E2E8F0; --success: #10B981; --danger: #EF4444; --warning: #F59E0B;
        }

        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; padding-bottom: calc(90px + env(safe-area-inset-bottom)); -webkit-tap-highlight-color: transparent; user-select: none; }
        input, select { user-select: auto; }
        ::-webkit-scrollbar { display: none; }

        .header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: calc(20px + env(safe-area-inset-top)) 20px 15px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .header-info h2 { margin: 0; font-weight: 800; font-size: 24px; letter-spacing: -0.5px; cursor: pointer; }
        .header-info p { margin: 4px 0 0 0; color: var(--primary); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .connection-pill { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .status-cloud { background: #DBEAFE; color: #1E40AF; }
        .status-error { background: #FEE2E2; color: #991B1B; }

        .view-container { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .active-view { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dashboard-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); padding: 12px 10px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.03); text-align: center; }
        .stat-val { font-size: 24px; font-weight: 800; margin: 0 0 4px 0; }
        .stat-label { font-size: 10px; font-weight: 700; color: var(--text-sub); margin: 0; text-transform: uppercase; }

        /* Subject Filtering UI */
        .subject-filters { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .subject-filters::-webkit-scrollbar { display: none; }
        .subject-pill { padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; background: var(--surface); border: 1px solid var(--border); color: var(--text-sub); white-space: nowrap; cursor: pointer; transition: 0.2s; }
        .subject-pill.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        
        .section-header { font-size: 12px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 10px 5px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

        .task-wrapper { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); border-left: 5px solid var(--border); display: flex; align-items: center; }
        .card-accent-critical { border-left-color: var(--danger); }
        .card-accent-high { border-left-color: var(--warning); }
        .card-accent-normal { border-left-color: var(--primary); }
        
        .check-circle { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #CBD5E1; margin-right: 15px; flex-shrink: 0; transition: 0.2s; background: #F8FAFC; }
        .check-circle.completed { background: var(--success); border-color: var(--success); transform: scale(1.1); }

        .task-icon { background: #F1F5F9; width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; flex-shrink: 0; }
        .task-info { flex-grow: 1; min-width: 0; cursor: pointer; } 
        .task-title { font-weight: 700; font-size: 16px; margin: 0 0 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-sub { font-size: 13px; color: var(--text-sub); margin: 0; }
        .task-date { font-size: 11px; font-weight: 700; text-align: right; margin-left: 8px; line-height: 1.3; white-space: nowrap;}

        .form-group { margin-bottom: 20px; }
        label { font-size: 12px; font-weight: 700; color: var(--text-sub); display: block; margin-bottom: 8px; text-transform: uppercase; }
        input[type="text"], input[type="datetime-local"], select { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border); box-sizing: border-box; font-size: 16px; -webkit-appearance: none; background: white; }
        
        .checkbox-container { display: flex; align-items: center; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 20px; }
        .checkbox-container input { width: 20px; height: 20px; margin-right: 10px; accent-color: var(--primary); }
        .special-checkbox { color: var(--primary); }

        button.primary-btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button.primary-btn:active { transform: scale(0.97); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid rgba(0,0,0,0.08); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; color: var(--text-sub); font-weight: 700; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 999; justify-content: center; align-items: center; font-weight: 800; color: var(--primary); }

        /* Drag and Drop Specific Styles */
        .sortable-ghost { opacity: 0.4; background: #F1F5F9; }
        .drag-handle { touch-action: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-info">
            <h2 onclick="handleTitleClick()">Assignments</h2>
            <p>Academic Matrix</p>
        </div>
        <div id="connectionStatus" class="connection-pill status-cloud">Connecting...</div>
    </div>

    <div id="view-matrix" class="view-container active-view">
        <div class="dashboard-stats">
            <div class="stat-card"><p class="stat-val" id="stat-total">0</p><p class="stat-label">Pending</p></div>
            <div class="stat-card"><p class="stat-val stat-urgent" id="stat-urgent" style="color:var(--danger);">0</p><p class="stat-label">Due Today</p></div>
            <div class="stat-card"><p class="stat-val" id="stat-streak" style="color:var(--warning);">0</p><p class="stat-label">Streak 🔥</p></div>
        </div>
        
        <div style="display: flex; gap: 10px; margin-bottom: 12px; width: 100%; box-sizing: border-box;">
            <select id="sortMode" onchange="changeSortMode()" style="flex: 1; min-width: 0; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 800; background: var(--surface); color: var(--text-main); border: 1px solid var(--border); outline: none;">
                <option value="date">📅 By Date</option>
                <option value="subject">📚 By Subject</option>
            </select>
            <select id="secondaryFilter" onchange="changeSecondaryFilter()" style="flex: 1; min-width: 0; padding: 10px; border-radius: 12px; font-size: 13px; font-weight: 800; background: var(--surface); color: var(--text-main); border: 1px solid var(--border); outline: none; text-overflow: ellipsis; white-space: nowrap;">
                <!-- Dynamically Populated by JS -->
            </select>
        </div>
        
        <div id="subjectFilters" class="subject-filters" style="margin-bottom: 15px; width: 100%;"></div>
        
        <div id="taskList"></div>
    </div>

    <div id="view-create" class="view-container">
        <div class="form-group"><label>Title</label><input type="text" id="taskTitle" placeholder="e.g. Signal Processing Lab"></div>
        <div class="form-group"><label>Subject</label><input type="text" id="taskSubject" placeholder="e.g. EE 301"></div>
        <div class="form-group"><label>Classification</label>
            <select id="taskType">
                <option value="Assignment">📄 Assignment</option>
                <option value="Quiz">🧠 Quiz</option>
                <option value="Exam">🎯 Exam</option>
                <option value="Lab Report">🔬 Lab Report</option>
                <option value="Study">📚 Study</option>
            </select>
        </div>
        <div class="form-group"><label>Target Date & Time</label><input type="datetime-local" id="taskDue"></div>
        <div class="form-group"><label>Priority Condition</label>
            <select id="taskPriority">
                <option value="Normal">Normal</option>
                <option value="High">High</option>
                <option value="Critical">Critical</option>
            </select>
        </div>

        <div class="form-group">
            <label>Checklist / Sub-tasks (Optional)</label>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="subtaskInput" placeholder="Add a step and tap +" onkeypress="if(event.key==='Enter') addSubtaskFromForm()" style="flex: 1;">
                <button type="button" onclick="addSubtaskFromForm()" style="background: var(--primary); color: white; border: none; border-radius: 14px; width: 50px; font-size: 24px; font-weight: bold; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;">+</button>
            </div>
            <div id="builderList" style="background: var(--surface); border-radius: 14px; border: 1px solid var(--border); display: none; overflow: hidden;"></div>
        </div>

        <div class="checkbox-container">
            <input type="checkbox" id="taskRecurring" onchange="toggleRecur()">
            <label for="taskRecurring" style="margin:0; text-transform:none; font-size:14px; font-weight:600;">Enable Recurring Cycle</label>
        </div>
        
        <div id="recurSettings" style="display: none; background: #F8FAFC; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px;">
            <div class="form-group"><label>Interval</label>
                <select id="taskInterval">
                    <option value="Weekly">Weekly</option>
                    <option value="Daily">Daily</option>
                    <option value="Bi-Weekly">Bi-Weekly</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;"><label>Cycle Expiration (Optional)</label><input type="datetime-local" id="taskRecurUntil"></div>
        </div>

        <div class="checkbox-container special-checkbox" id="editOccurGroup" style="display: none;">
            <input type="checkbox" id="taskThisOccurOnly">
            <label for="taskThisOccurOnly" style="margin:0; text-transform:none; font-size:14px; font-weight:700; color:var(--primary);">Edit this occurrence only</label>
        </div>

        <button class="primary-btn" id="deployBtn" onclick="submitToMatrix()">Deploy to Matrix</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-matrix" onclick="switchNavTab('matrix')">📡 Matrix</div>
        <div class="nav-item" id="nav-create" onclick="switchNavTab('create')">➕ Deploy</div>
    </div>

    <div id="loadingOverlay">Syncing Data...</div>

    <script>
        const GITHUB_URL = "https://victoriakanbi.github.io/assignment-tracker/";
        
        if (window.location.hostname && !window.location.hostname.includes('github.io')) {
            setInterval(() => {
                fetch('/').catch(() => {
                    window.location.href = GITHUB_URL;
                });
            }, 8000); 
        }
        
        const firebaseConfig = { databaseURL: "https://fluxgate-victor-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let API_KEY = localStorage.getItem('matrix_api_key');
        let DATABASE_ID = null; 
        
        let editingTaskId = null;
        let editingTaskOriginal = null;
        let globalTaskData = null;
        let activeSubjectFilter = 'All';
        let currentSubtasks = []; 
        let lookaheadDays = parseInt(localStorage.getItem('matrix_lookahead')) || 3;
        
        // FIX: Stateful Set to track which cards are currently expanded
        let expandedTasks = new Set();
        
        document.addEventListener('DOMContentLoaded', () => {
            const sortEl = document.getElementById('sortMode');
            if(sortEl) {
                const savedSort = localStorage.getItem('matrix_sort') || 'date';
                sortEl.value = savedSort;
            }

            const builderListEl = document.getElementById('builderList');
            if (builderListEl && typeof Sortable !== 'undefined') {
                Sortable.create(builderListEl, {
                    animation: 150,
                    handle: '.drag-handle',
                    ghostClass: 'sortable-ghost',
                    onEnd: function (evt) {
                        if (evt.oldIndex !== evt.newIndex) {
                            const movedItem = currentSubtasks.splice(evt.oldIndex, 1)[0];
                            currentSubtasks.splice(evt.newIndex, 0, movedItem);
                            renderBuilderList(); 
                        }
                    }
                });
            }
        });

        function changeSecondaryFilter() {
            let mode = document.getElementById('sortMode').value;
            let val = document.getElementById('secondaryFilter').value;
            if (mode === 'date') {
                lookaheadDays = parseInt(val);
                localStorage.setItem('matrix_lookahead', lookaheadDays);
            } else {
                activeSubjectFilter = val;
            }
            if (globalTaskData) buildTaskList();
        }

        function populateSecondaryFilter(subjects) {
            const sortMode = document.getElementById('sortMode') ? document.getElementById('sortMode').value : 'date';
            const filterEl = document.getElementById('secondaryFilter');
            if (!filterEl) return;
            
            let html = '';
            if (sortMode === 'date') {
                [1, 2, 3, 4, 5].forEach(d => {
                    let selected = (d == lookaheadDays) ? 'selected' : '';
                    html += `<option value="${d}" ${selected}>${d} Day${d > 1 ? 's' : ''}</option>`;
                });
            } else {
                subjects.forEach(s => {
                    let selected = (s === activeSubjectFilter) ? 'selected' : '';
                    let displayLabel = s === 'All' ? 'All Subjects' : s;
                    html += `<option value="${s.replace(/'/g, "\\'")}" ${selected}>${displayLabel}</option>`;
                });
            }
            filterEl.innerHTML = html;
        }

        function changeSortMode() {
            localStorage.setItem('matrix_sort', document.getElementById('sortMode').value);
            if (globalTaskData) buildTaskList();
        }

        let titleClickCount = 0, titleClickTimer = null;
        function handleTitleClick() {
            titleClickCount++; clearTimeout(titleClickTimer);
            if (titleClickCount >= 3) {
                if(confirm("Reset Security Password?")) { localStorage.removeItem('matrix_api_key'); window.location.reload(); }
                titleClickCount = 0;
            }
            titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 500);
        }

        function getPassword() {
            if (!API_KEY) {
                API_KEY = prompt("Matrix Cloud Locked\nEnter Security Password:");
                if (API_KEY) { localStorage.setItem('matrix_api_key', API_KEY); return true; }
                document.getElementById('connectionStatus').innerText = "Locked";
                document.getElementById('connectionStatus').className = "connection-pill status-error";
                return false;
            }
            return true;
        }

        function initializeMatrix() {
            if (!getPassword()) return;

            database.ref('Gatekeeper/' + API_KEY).once('value').then(snap => {
                const vaultPointer = snap.val();
                if (vaultPointer) {
                    DATABASE_ID = vaultPointer;
                    document.getElementById('connectionStatus').innerText = "Cloud Sync Active";
                    document.getElementById('connectionStatus').className = "connection-pill status-cloud";
                    startTaskListener();

                    database.ref(DATABASE_ID + '/streak').on('value', sSnap => {
                        const s = sSnap.val() || { current: 0, lastDate: '' };
                        let now = new Date();
                        let todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
                        let yesterday = new Date(now);
                        yesterday.setDate(yesterday.getDate() - 1);
                        let yestStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth()+1).padStart(2,'0') + '-' + String(yesterday.getDate()).padStart(2,'0');

                        if (s.lastDate && s.lastDate !== todayStr && s.lastDate !== yestStr) {
                            document.getElementById('stat-streak').innerText = "0";
                        } else {
                            document.getElementById('stat-streak').innerText = s.current;
                        }
                    });

                } else {
                    alert("Password Incorrect or Changed. Access Denied.");
                    localStorage.removeItem('matrix_api_key');
                    window.location.reload();
                }
            }).catch(err => {
                alert("Gatekeeper Error: Permission Denied.");
                localStorage.removeItem('matrix_api_key');
                window.location.reload();
            });
        }

        function startTaskListener() {
            database.ref(DATABASE_ID + '/tasks').on('value', (snap) => {
                renderTasks(snap.val());
            });
        }

        function filterBySubject(sub) {
            activeSubjectFilter = sub;
            buildTaskList();
        }

        function renderTasks(data) {
            globalTaskData = data;
            buildTaskList();
        }

        function addSubtaskFromForm() {
            const inp = document.getElementById('subtaskInput');
            const text = inp.value.trim();
            if(text) {
                currentSubtasks.push({ text: text, done: false });
                inp.value = '';
                renderBuilderList();
            }
        }

        function removeSubtask(idx) {
            currentSubtasks.splice(idx, 1);
            renderBuilderList();
        }

        // FIX: Added flex wrapping and min-width rules here to prevent the builder list from stretching out of bounds
        function renderBuilderList() {
            const list = document.getElementById('builderList');
            if(currentSubtasks.length === 0) {
                list.style.display = 'none';
                list.innerHTML = '';
                return;
            }
            list.style.display = 'block';
            list.innerHTML = currentSubtasks.map((st, i) => `
                <div style="display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 16px; border-bottom: ${i === currentSubtasks.length - 1 ? 'none' : '1px solid var(--border)'}; font-size: 14px; font-weight: 600; background: var(--surface);">
                    <div style="display: flex; align-items: flex-start; flex: 1; min-width: 0;">
                        <span class="drag-handle" style="color: #94A3B8; margin-right: 12px; cursor: grab; font-size: 18px; margin-top: -2px;">☰</span>
                        <span style="flex: 1; min-width: 0; white-space: normal; word-wrap: break-word; line-height: 1.4; ${st.done ? 'text-decoration:line-through; color:var(--text-sub);' : 'color:var(--text-main);'}">${st.text}</span>
                    </div>
                    <button type="button" onclick="removeSubtask(${i})" style="background: none; border: none; color: var(--danger); font-size: 18px; font-weight: bold; cursor: pointer; padding: 0; margin-left: 10px;">✕</button>
                </div>
            `).join('');
        }

        function toggleSubtask(taskId, subtaskIdx, isDone) {
            if (!DATABASE_ID) return;
            database.ref(DATABASE_ID + '/tasks/' + taskId + '/subtasks/' + subtaskIdx).update({ done: isDone });
        }
        
        // FIX: The toggle handler that collapses or expands the subtasks
        function toggleSubtaskView(taskId, event) {
            if (event) {
                event.stopPropagation(); // Prevents it from accidentally opening the edit window
                event.preventDefault();
            }
            const subContainer = document.getElementById('subtasks-' + taskId);
            const toggleIcon = document.getElementById('toggle-icon-' + taskId);
            
            if (expandedTasks.has(taskId)) {
                expandedTasks.delete(taskId);
                subContainer.style.display = 'none';
                toggleIcon.innerText = toggleIcon.innerText.replace('▼', '▶');
            } else {
                expandedTasks.add(taskId);
                subContainer.style.display = 'block';
                toggleIcon.innerText = toggleIcon.innerText.replace('▶', '▼');
            }
        }

        function buildTaskList() {
            const list = document.getElementById('taskList');
            const filterContainer = document.getElementById('subjectFilters');
            const sortMode = document.getElementById('sortMode') ? document.getElementById('sortMode').value : 'date';
            const data = globalTaskData;

            if (!data) { 
                list.innerHTML = '<p style="text-align:center; color:#888; margin-top:40px;">No assignments pending.</p>'; 
                document.getElementById('stat-total').innerText = "0"; 
                document.getElementById('stat-urgent').innerText = "0"; 
                filterContainer.innerHTML = '';
                populateSecondaryFilter(['All']);
                return; 
            }
            
            let allTasks = Object.keys(data)
                .map(k => ({id: k, ...data[k]}))
                .filter(t => !t.pending_completion) 
                .sort((a,b) => new Date(a.due) - new Date(b.due));
            
            let subjects = ['All', ...new Set(allTasks.map(t => t.subject).filter(Boolean))];
            
            if (!subjects.includes(activeSubjectFilter)) activeSubjectFilter = 'All';

            populateSecondaryFilter(subjects);

            filterContainer.innerHTML = subjects.map(s => 
                `<div class="subject-pill ${s === activeSubjectFilter ? 'active' : ''}" onclick="filterBySubject('${s.replace(/'/g, "\\'")}')">${s}</div>`
            ).join('');
            
            filterContainer.style.display = (sortMode === 'subject') ? 'none' : 'flex';

            let overdueOrTodayCount = 0;
            let now = new Date();
            let todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
            let lookaheadEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + lookaheadDays, 23, 59, 59);

            allTasks.forEach(t => {
                let d = new Date(t.due);
                if (d <= todayEnd) overdueOrTodayCount++;
            });
            document.getElementById('stat-total').innerText = allTasks.length;
            document.getElementById('stat-urgent').innerText = overdueOrTodayCount;

            let filteredTasks = activeSubjectFilter === 'All' ? allTasks : allTasks.filter(t => t.subject === activeSubjectFilter);

            if (filteredTasks.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#888; margin-top:40px;">No assignments pending for this filter.</p>';
                return;
            }

            let groups = {};
            
            if (sortMode === 'subject') {
                filteredTasks.forEach(t => {
                    let sub = t.subject || 'Uncategorized';
                    if (!groups[sub]) groups[sub] = [];
                    groups[sub].push(t);
                });
                
                let sortedKeys = Object.keys(groups).sort();
                let newGroups = {};
                sortedKeys.forEach(k => newGroups[k] = groups[k]);
                groups = newGroups;
                
            } else {
                groups = {
                    'Overdue': [],
                    'Due Today': [],
                    [`Due in ${lookaheadDays} Days`]: [],
                    'Upcoming': []
                };

                filteredTasks.forEach(t => {
                    let d = new Date(t.due);
                    if (d < now) groups['Overdue'].push(t);
                    else if (d <= todayEnd) groups['Due Today'].push(t);
                    else if (d <= lookaheadEnd) groups[`Due in ${lookaheadDays} Days`].push(t);
                    else groups['Upcoming'].push(t);
                });
            }

            let html = "";
            for (let [groupName, tasks] of Object.entries(groups)) {
                if (tasks.length > 0) {
                    let accent = groupName === 'Overdue' ? 'color: var(--danger); border-bottom-color: var(--danger);' : '';
                    html += `<div class="section-header" style="${accent}">${groupName}</div>`;
                    
                    tasks.forEach(t => {
                        let acc = t.priority === 'Critical' ? 'critical' : (t.priority === 'High' ? 'high' : 'normal');
                        let icon = {Assignment:"📄",Quiz:"🧠",Exam:"🎯","Lab Report":"🔬",Study:"📚"}[t.type] || "📄";
                        let d = new Date(t.due);
                        
                        const dateStr = d.toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});
                        const timeStr = d.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'});
                        
                        // Check if the current user left this task expanded before the render sync
                        let isExpanded = expandedTasks.has(t.id);
                        let displayStyle = isExpanded ? 'block' : 'none';
                        let iconChar = isExpanded ? '▼' : '▶';
                        
                        let subHtml = '';
                        if(t.subtasks && t.subtasks.length > 0) {
                            subHtml = `<div id="subtasks-${t.id}" style="display: ${displayStyle}; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--border); margin-left: 41px;">` + 
                                t.subtasks.map((st, idx) => `
                                    <div style="display: flex; align-items: flex-start; margin-bottom: 8px;">
                                        <input type="checkbox" ${st.done ? 'checked' : ''} onchange="toggleSubtask('${t.id}', ${idx}, this.checked)" style="width: 18px; height: 18px; margin-right: 10px; margin-top: 1px; accent-color: var(--primary); flex-shrink: 0;">
                                        <span style="flex: 1; min-width: 0; font-size: 13px; font-weight: 600; color: ${st.done ? 'var(--text-sub)' : 'var(--text-main)'}; text-decoration: ${st.done ? 'line-through' : 'none'}; white-space: normal; word-wrap: break-word; line-height: 1.4;">${st.text}</span>
                                    </div>
                                `).join('') + `</div>`;
                        }

                        html += `<div class="task-wrapper card-accent-${acc}" style="flex-direction: column; align-items: stretch;">
                            <div style="display: flex; align-items: center; width: 100%;">
                                <div class="check-circle" onclick="completeTask('${t.id}', this)"></div>
                                <div class="task-icon">${icon}</div>
                                <div class="task-info">
                                    <div onclick='openEditMode(${JSON.stringify(t).replace(/'/g, "&#39;")})' style="cursor: pointer;">
                                        <p class="task-title">${t.title}</p>
                                        <p class="task-sub">${t.type} • ${t.subject} ${t.recurring ? '🔄' : ''}</p>
                                    </div>
                                    ${t.subtasks && t.subtasks.length > 0 ? `
                                    <div style="margin-top: 4px; display: inline-block; padding: 4px 0;" onclick="toggleSubtaskView('${t.id}', event)">
                                        <span id="toggle-icon-${t.id}" style="color: var(--primary); font-size: 11px; font-weight: 800; cursor: pointer; user-select: none;">${iconChar} ${t.subtasks.length} Subtasks</span>
                                    </div>
                                    ` : ''}
                                </div>
                                <div class="task-meta"><div class="task-date">${dateStr}<br><span style="font-weight:500; font-size:10px; color:var(--text-sub);">${timeStr}</span></div></div>
                            </div>
                            ${subHtml}
                        </div>`;
                    });
                }
            }
            list.innerHTML = html;
        }

        function toggleRecur() {
            document.getElementById('recurSettings').style.display = document.getElementById('taskRecurring').checked ? 'block' : 'none';
        }

        function clearForm() {
            editingTaskId = null;
            editingTaskOriginal = null;
            currentSubtasks = []; 
            renderBuilderList(); 
            
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskSubject').value = '';
            document.getElementById('taskDue').value = '';
            document.getElementById('taskRecurring').checked = false;
            document.getElementById('taskRecurUntil').value = '';
            document.getElementById('editOccurGroup').style.display = 'none';
            document.getElementById('taskThisOccurOnly').checked = false;
            document.getElementById('deployBtn').innerText = 'Deploy to Matrix';
            toggleRecur();
        }

        function openEditMode(task) {
            editingTaskId = task.id;
            editingTaskOriginal = task;
            
            currentSubtasks = task.subtasks ? JSON.parse(JSON.stringify(task.subtasks)) : []; 
            renderBuilderList();
            
            document.getElementById('taskTitle').value = task.title || '';
            document.getElementById('taskSubject').value = task.subject || '';
            document.getElementById('taskType').value = task.type || 'Assignment';
            if (task.due) document.getElementById('taskDue').value = task.due.substring(0, 16);
            document.getElementById('taskPriority').value = task.priority || 'Normal';
            
            document.getElementById('taskRecurring').checked = !!task.recurring;
            toggleRecur();
            
            if (task.recurring) {
                document.getElementById('taskInterval').value = task.interval || 'Weekly';
                if (task.recur_until) document.getElementById('taskRecurUntil').value = task.recur_until.substring(0, 16);
                else document.getElementById('taskRecurUntil').value = '';
                document.getElementById('editOccurGroup').style.display = 'flex';
            } else {
                document.getElementById('editOccurGroup').style.display = 'none';
            }
            
            document.getElementById('deployBtn').innerText = 'Commit Changes';
            switchTabView('create');
        }

        function getNextDueDate(dateStr, interval) {
            let d = new Date(dateStr);
            if (interval === 'Daily') d.setDate(d.getDate() + 1);
            else if (interval === 'Weekly') d.setDate(d.getDate() + 7);
            else if (interval === 'Bi-Weekly') d.setDate(d.getDate() + 14);
            
            let pad = (n) => n < 10 ? '0'+n : n;
            return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':00';
        }

        async function spawnNextOccurrence(task) {
            let nextDue = getNextDueDate(task.due, task.interval);
            let shouldRecur = true;
            if (task.recur_until && new Date(nextDue) > new Date(task.recur_until)) {
                shouldRecur = false;
            }
            if (shouldRecur) {
                let nextSubtasks = null;
                if (task.subtasks) {
                    nextSubtasks = task.subtasks.map(st => ({ text: st.text, done: false }));
                }

                let newTask = {...task, due: nextDue, processed_by_pc: true, subtasks: nextSubtasks}; 
                delete newTask.id;
                await database.ref(DATABASE_ID + '/tasks/' + (Date.now() + Math.floor(Math.random() * 1000))).set(newTask);
            }
        }

        async function submitToMatrix() {
            if (!DATABASE_ID) return alert("Vault locked. Cannot save.");
            
            const titleVal = document.getElementById('taskTitle').value.trim();
            const dueVal = document.getElementById('taskDue').value;
            if (!titleVal || !dueVal) return alert("Title and Date required");

            const isRecur = document.getElementById('taskRecurring').checked;
            let recurUntil = document.getElementById('taskRecurUntil').value;
            if (recurUntil && recurUntil.length === 16) recurUntil += ":00";

            let payload = {
                title: titleVal,
                subject: document.getElementById('taskSubject').value.trim(),
                type: document.getElementById('taskType').value,
                due: dueVal + (dueVal.length === 16 ? ":00" : ""),
                priority: document.getElementById('taskPriority').value,
                recurring: isRecur,
                interval: isRecur ? document.getElementById('taskInterval').value : null,
                recur_until: isRecur ? recurUntil : null,
                subtasks: currentSubtasks.length > 0 ? currentSubtasks : null, 
                last_alert: editingTaskOriginal ? (editingTaskOriginal.last_alert || 0) : 0
            };

            document.getElementById('loadingOverlay').style.display = 'flex';

            if (editingTaskId) {
                const thisOccurOnly = document.getElementById('taskThisOccurOnly').checked;
                if (thisOccurOnly && editingTaskOriginal.recurring) {
                    await spawnNextOccurrence(editingTaskOriginal);
                    payload.recurring = false;
                    payload.interval = null;
                    payload.recur_until = null;
                }
                await database.ref(DATABASE_ID + '/tasks/' + editingTaskId).update(payload);
            } else {
                payload.processed_by_pc = false; 
                await database.ref(DATABASE_ID + '/tasks/' + Date.now()).set(payload);
            }

            document.getElementById('loadingOverlay').style.display = 'none';
            clearForm();
            switchNavTab('matrix');
        }

        async function completeTask(taskId, el) {
            if (!DATABASE_ID) return;
            el.classList.add('completed');
            
            let task;
            await database.ref(DATABASE_ID + '/tasks/' + taskId).once('value', snap => { task = snap.val(); });
            if (task && task.recurring) await spawnNextOccurrence(task);

            let streakSnap = await database.ref(DATABASE_ID + '/streak').once('value');
            let streak = streakSnap.val() || { current: 0, lastDate: '' };
            
            let now = new Date();
            let todayStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
            let yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            let yestStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth()+1).padStart(2,'0') + '-' + String(yesterday.getDate()).padStart(2,'0');

            let oldStreak = streak.current;
            if (streak.lastDate === yestStr) {
                streak.current++;
                streak.lastDate = todayStr;
            } else if (streak.lastDate !== todayStr) {
                streak.current = 1;
                streak.lastDate = todayStr;
            }
            
            if (streak.current !== oldStreak) {
                await database.ref(DATABASE_ID + '/streak').update(streak);
                
                if (streak.current > 1) { 
                    await database.ref(DATABASE_ID + '/tasks/' + (Date.now() + 500)).set({
                        title: `${streak.current} Day Streak! 🔥`,
                        subject: 'Keep it up!',
                        type: 'Achievement',
                        due: new Date().toISOString(),
                        priority: 'Normal',
                        recurring: false,
                        processed_by_pc: true,
                        pending_completion: true 
                    });
                }
            }

            setTimeout(async () => {
                document.getElementById('loadingOverlay').style.display = 'flex';
                await database.ref(DATABASE_ID + '/tasks/' + taskId).update({ pending_completion: true });
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 300);
        }

        function switchTabView(t) {
            document.getElementById('view-matrix').classList.toggle('active-view', t==='matrix'); 
            document.getElementById('view-create').classList.toggle('active-view', t==='create');
            document.getElementById('nav-matrix').classList.toggle('active', t==='matrix'); 
            document.getElementById('nav-create').classList.toggle('active', t==='create');
        }

        function switchNavTab(t) {
            if (t === 'create' && !editingTaskId) clearForm();
            if (t === 'matrix') clearForm(); 
            switchTabView(t);
        }

        initializeMatrix();
    </script>
</body>
</html>
