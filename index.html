<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Assignment Tracker</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg: #F8FAFC; --surface: #FFFFFF; --primary: #4F46E5; 
            --primary-hover: #4338CA; --text-main: #0F172A; --text-sub: #64748B;
            --border: #E2E8F0; --success: #10B981; --danger: #EF4444; --warning: #F59E0B;
        }

        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 0; padding-bottom: calc(90px + env(safe-area-inset-bottom)); -webkit-tap-highlight-color: transparent; user-select: none; }
        input, select { user-select: auto; }
        ::-webkit-scrollbar { display: none; }

        .header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: calc(20px + env(safe-area-inset-top)) 20px 15px 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .header-info h2 { margin: 0; font-weight: 800; font-size: 24px; letter-spacing: -0.5px; cursor: pointer; }
        .header-info p { margin: 4px 0 0 0; color: var(--primary); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .connection-pill { padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .status-cloud { background: #DBEAFE; color: #1E40AF; }
        .status-error { background: #FEE2E2; color: #991B1B; }

        .view-container { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .active-view { display: block; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .dashboard-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-card { background: var(--surface); padding: 15px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .stat-val { font-size: 28px; font-weight: 800; margin: 0 0 4px 0; }
        .stat-label { font-size: 11px; font-weight: 700; color: var(--text-sub); margin: 0; text-transform: uppercase; }

        .task-wrapper { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); border-left: 5px solid var(--border); display: flex; align-items: center; }
        .card-accent-critical { border-left-color: var(--danger); }
        .card-accent-high { border-left-color: var(--warning); }
        .card-accent-normal { border-left-color: var(--primary); }
        
        .check-circle { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #CBD5E1; margin-right: 15px; flex-shrink: 0; transition: 0.2s; background: #F8FAFC; }
        .check-circle.completed { background: var(--success); border-color: var(--success); transform: scale(1.1); }

        .task-icon { background: #F1F5F9; width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; flex-shrink: 0; }
        .task-info { flex-grow: 1; min-width: 0; cursor: pointer; } /* Added pointer for editing */
        .task-title { font-weight: 700; font-size: 16px; margin: 0 0 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-sub { font-size: 13px; color: var(--text-sub); margin: 0; }
        .task-date { font-size: 13px; font-weight: 700; text-align: right; margin-left: 10px;}

        .form-group { margin-bottom: 20px; }
        label { font-size: 12px; font-weight: 700; color: var(--text-sub); display: block; margin-bottom: 8px; text-transform: uppercase; }
        input[type="text"], input[type="datetime-local"], select { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border); box-sizing: border-box; font-size: 16px; -webkit-appearance: none; background: white; }
        
        .checkbox-container { display: flex; align-items: center; font-size: 14px; font-weight: 600; color: var(--text-main); margin-bottom: 20px; }
        .checkbox-container input { width: 20px; height: 20px; margin-right: 10px; accent-color: var(--primary); }
        .special-checkbox { color: var(--primary); }

        button.primary-btn { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 14px; font-weight: 800; width: 100%; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button.primary-btn:active { transform: scale(0.97); }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-top: 1px solid rgba(0,0,0,0.08); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px 0; color: var(--text-sub); font-weight: 700; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: var(--primary); }

        #loadingOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 999; justify-content: center; align-items: center; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-info">
            <h2 onclick="handleTitleClick()">Assignments</h2>
            <p>Academic Matrix</p>
        </div>
        <div id="connectionStatus" class="connection-pill status-cloud">Connecting...</div>
    </div>

    <div id="view-matrix" class="view-container active-view">
        <div class="dashboard-stats">
            <div class="stat-card"><p class="stat-val" id="stat-total">0</p><p class="stat-label">Pending Total</p></div>
            <div class="stat-card"><p class="stat-val stat-urgent" id="stat-urgent" style="color:var(--danger);">0</p><p class="stat-label">Due Today / Overdue</p></div>
        </div>
        <div id="taskList"></div>
    </div>

    <div id="view-create" class="view-container">
        <div class="form-group"><label>Title</label><input type="text" id="taskTitle" placeholder="e.g. Signal Processing Lab"></div>
        <div class="form-group"><label>Subject</label><input type="text" id="taskSubject" placeholder="e.g. EE 301"></div>
        <div class="form-group"><label>Classification</label>
            <select id="taskType">
                <option value="Assignment">📄 Assignment</option>
                <option value="Quiz">🧠 Quiz</option>
                <option value="Exam">🎯 Exam</option>
                <option value="Lab Report">🔬 Lab Report</option>
                <option value="Study">📚 Study</option>
            </select>
        </div>
        <div class="form-group"><label>Target Date & Time</label><input type="datetime-local" id="taskDue"></div>
        <div class="form-group"><label>Priority Condition</label>
            <select id="taskPriority">
                <option value="Normal">Normal</option>
                <option value="High">High</option>
                <option value="Critical">Critical</option>
            </select>
        </div>

        <!-- NEW RECURRING UI SECTIONS -->
        <div class="checkbox-container">
            <input type="checkbox" id="taskRecurring" onchange="toggleRecur()">
            <label for="taskRecurring" style="margin:0; text-transform:none; font-size:14px; font-weight:600;">Enable Recurring Cycle</label>
        </div>
        
        <div id="recurSettings" style="display: none; background: #F8FAFC; padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px;">
            <div class="form-group"><label>Interval</label>
                <select id="taskInterval">
                    <option value="Weekly">Weekly</option>
                    <option value="Daily">Daily</option>
                    <option value="Bi-Weekly">Bi-Weekly</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:0;"><label>Cycle Expiration (Optional)</label><input type="datetime-local" id="taskRecurUntil"></div>
        </div>

        <div class="checkbox-container special-checkbox" id="editOccurGroup" style="display: none;">
            <input type="checkbox" id="taskThisOccurOnly">
            <label for="taskThisOccurOnly" style="margin:0; text-transform:none; font-size:14px; font-weight:700; color:var(--primary);">Edit this occurrence only</label>
        </div>

        <button class="primary-btn" id="deployBtn" onclick="submitToMatrix()">Deploy to Matrix</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-matrix" onclick="switchNavTab('matrix')">📡 Matrix</div>
        <div class="nav-item" id="nav-create" onclick="switchNavTab('create')">➕ Deploy</div>
    </div>

    <div id="loadingOverlay">Syncing Data...</div>

    <script>
        const GITHUB_URL = "https://victoriakanbi.github.io/assignment-tracker/";
        
        // --- OFFLINE REDIRECT ENGINE ---
        if (window.location.hostname && !window.location.hostname.includes('github.io')) {
            setInterval(() => {
                fetch('/').catch(() => {
                    window.location.href = GITHUB_URL;
                });
            }, 8000); 
        }
        
        // --- FIREBASE GATEKEEPER LOGIC ---
        const firebaseConfig = { databaseURL: "https://fluxgate-victor-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        let API_KEY = localStorage.getItem('matrix_api_key');
        let DATABASE_ID = null; 
        
        // Form State
        let editingTaskId = null;
        let editingTaskOriginal = null;

        let titleClickCount = 0, titleClickTimer = null;
        function handleTitleClick() {
            titleClickCount++; clearTimeout(titleClickTimer);
            if (titleClickCount >= 3) {
                if(confirm("Reset Security Password?")) { localStorage.removeItem('matrix_api_key'); window.location.reload(); }
                titleClickCount = 0;
            }
            titleClickTimer = setTimeout(() => { titleClickCount = 0; }, 500);
        }

        function getPassword() {
            if (!API_KEY) {
                API_KEY = prompt("Matrix Cloud Locked\nEnter Security Password:");
                if (API_KEY) { localStorage.setItem('matrix_api_key', API_KEY); return true; }
                document.getElementById('connectionStatus').innerText = "Locked";
                document.getElementById('connectionStatus').className = "connection-pill status-error";
                return false;
            }
            return true;
        }

        function initializeMatrix() {
            if (!getPassword()) return;

            database.ref('Gatekeeper/' + API_KEY).once('value').then(snap => {
                const vaultPointer = snap.val();
                if (vaultPointer) {
                    DATABASE_ID = vaultPointer;
                    document.getElementById('connectionStatus').innerText = "Cloud Sync Active";
                    document.getElementById('connectionStatus').className = "connection-pill status-cloud";
                    startTaskListener();
                } else {
                    alert("Password Incorrect or Changed. Access Denied.");
                    localStorage.removeItem('matrix_api_key');
                    window.location.reload();
                }
            }).catch(err => {
                alert("Gatekeeper Error: Permission Denied.");
                localStorage.removeItem('matrix_api_key');
                window.location.reload();
            });
        }

        function startTaskListener() {
            database.ref(DATABASE_ID + '/tasks').on('value', (snap) => {
                renderTasks(snap.val());
            });
        }

        function renderTasks(data) {
            const list = document.getElementById('taskList');
            if (!data) { list.innerHTML = '<p style="text-align:center; color:#888; margin-top:40px;">No assignments pending.</p>'; document.getElementById('stat-total').innerText="0"; document.getElementById('stat-urgent').innerText="0"; return; }
            
            let arr = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => new Date(a.due) - new Date(b.due));
            let overdue = 0, html = "";
            let now = new Date(), tom = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            
            arr.forEach(t => {
                let d = new Date(t.due);
                if (d < tom) overdue++;
                let acc = t.priority === 'Critical' ? 'critical' : (t.priority === 'High' ? 'high' : 'normal');
                let icon = {Assignment:"📄",Quiz:"🧠",Exam:"🎯",LabReport:"🔬",Study:"📚"}[t.type.replace(/\s/g,'')] || "📄";
                const dateStr = d.toLocaleDateString('en-US',{weekday:'short', month:'short',day:'numeric'});
                
                // Clicking the text/info opens the editor, clicking the circle completes it
                html += `<div class="task-wrapper card-accent-${acc}">
                <div class="check-circle" onclick="completeTask('${t.id}', this)"></div><div class="task-icon">${icon}</div>
                <div class="task-info" onclick='openEditMode(${JSON.stringify(t).replace(/'/g, "\\'")})'>
                    <p class="task-title">${t.title}</p>
                    <p class="task-sub">${t.type} • ${t.subject} ${t.recurring ? '🔄' : ''}</p>
                </div>
                <div class="task-meta"><div class="task-date">${dateStr}</div></div></div>`;
            });
            
            list.innerHTML = html;
            document.getElementById('stat-total').innerText = arr.length;
            document.getElementById('stat-urgent').innerText = overdue;
        }

        // --- NEW EDIT AND RECURRING LOGIC ---

        function toggleRecur() {
            document.getElementById('recurSettings').style.display = document.getElementById('taskRecurring').checked ? 'block' : 'none';
        }

        function clearForm() {
            editingTaskId = null;
            editingTaskOriginal = null;
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskSubject').value = '';
            document.getElementById('taskDue').value = '';
            document.getElementById('taskRecurring').checked = false;
            document.getElementById('taskRecurUntil').value = '';
            document.getElementById('editOccurGroup').style.display = 'none';
            document.getElementById('taskThisOccurOnly').checked = false;
            document.getElementById('deployBtn').innerText = 'Deploy to Matrix';
            toggleRecur();
        }

        function openEditMode(task) {
            editingTaskId = task.id;
            editingTaskOriginal = task;
            
            document.getElementById('taskTitle').value = task.title || '';
            document.getElementById('taskSubject').value = task.subject || '';
            document.getElementById('taskType').value = task.type || 'Assignment';
            if (task.due) document.getElementById('taskDue').value = task.due.substring(0, 16);
            document.getElementById('taskPriority').value = task.priority || 'Normal';
            
            document.getElementById('taskRecurring').checked = !!task.recurring;
            toggleRecur();
            
            if (task.recurring) {
                document.getElementById('taskInterval').value = task.interval || 'Weekly';
                if (task.recur_until) document.getElementById('taskRecurUntil').value = task.recur_until.substring(0, 16);
                else document.getElementById('taskRecurUntil').value = '';
                document.getElementById('editOccurGroup').style.display = 'flex';
            } else {
                document.getElementById('editOccurGroup').style.display = 'none';
            }
            
            document.getElementById('deployBtn').innerText = 'Commit Changes';
            switchTabView('create');
        }

        function getNextDueDate(dateStr, interval) {
            let d = new Date(dateStr);
            if (interval === 'Daily') d.setDate(d.getDate() + 1);
            else if (interval === 'Weekly') d.setDate(d.getDate() + 7);
            else if (interval === 'Bi-Weekly') d.setDate(d.getDate() + 14);
            
            let pad = (n) => n < 10 ? '0'+n : n;
            return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + 'T' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':00';
        }

        async function spawnNextOccurrence(task) {
            let nextDue = getNextDueDate(task.due, task.interval);
            let shouldRecur = true;
            if (task.recur_until && new Date(nextDue) > new Date(task.recur_until)) {
                shouldRecur = false;
            }
            if (shouldRecur) {
                let newTask = {...task, due: nextDue, processed_by_pc: true}; // True because it's automated schedule spawn
                delete newTask.id;
                await database.ref(DATABASE_ID + '/tasks/' + (Date.now() + Math.floor(Math.random() * 1000))).set(newTask);
            }
        }

        async function submitToMatrix() {
            if (!DATABASE_ID) return alert("Vault locked. Cannot save.");
            
            const titleVal = document.getElementById('taskTitle').value.trim();
            const dueVal = document.getElementById('taskDue').value;
            if (!titleVal || !dueVal) return alert("Title and Date required");

            const isRecur = document.getElementById('taskRecurring').checked;
            let recurUntil = document.getElementById('taskRecurUntil').value;
            if (recurUntil && recurUntil.length === 16) recurUntil += ":00";

            let payload = {
                title: titleVal,
                subject: document.getElementById('taskSubject').value.trim(),
                type: document.getElementById('taskType').value,
                due: dueVal + (dueVal.length === 16 ? ":00" : ""),
                priority: document.getElementById('taskPriority').value,
                recurring: isRecur,
                interval: isRecur ? document.getElementById('taskInterval').value : null,
                recur_until: isRecur ? recurUntil : null,
                last_alert: editingTaskOriginal ? (editingTaskOriginal.last_alert || 0) : 0
            };

            document.getElementById('loadingOverlay').style.display = 'flex';

            if (editingTaskId) {
                // UPDATE LOGIC
                const thisOccurOnly = document.getElementById('taskThisOccurOnly').checked;
                
                if (thisOccurOnly && editingTaskOriginal.recurring) {
                    await spawnNextOccurrence(editingTaskOriginal);
                    payload.recurring = false;
                    payload.interval = null;
                    payload.recur_until = null;
                }
                await database.ref(DATABASE_ID + '/tasks/' + editingTaskId).update(payload);
            } else {
                // CREATE NEW LOGIC
                payload.processed_by_pc = false; // Trigger PC HUD to send receipt email
                await database.ref(DATABASE_ID + '/tasks/' + Date.now()).set(payload);
            }

            document.getElementById('loadingOverlay').style.display = 'none';
            clearForm();
            switchNavTab('matrix');
        }

        async function completeTask(taskId, el) {
            if (!DATABASE_ID) return;
            el.classList.add('completed');
            
            // Check if it's recurring before deleting
            let task;
            await database.ref(DATABASE_ID + '/tasks/' + taskId).once('value', snap => { task = snap.val(); });
            if (task && task.recurring) await spawnNextOccurrence(task);

            setTimeout(async () => {
                document.getElementById('loadingOverlay').style.display = 'flex';
                await database.ref(DATABASE_ID + '/tasks/' + taskId).remove();
                document.getElementById('loadingOverlay').style.display = 'none';
            }, 300);
        }

        function switchTabView(t) {
            document.getElementById('view-matrix').classList.toggle('active-view', t==='matrix'); 
            document.getElementById('view-create').classList.toggle('active-view', t==='create');
            document.getElementById('nav-matrix').classList.toggle('active', t==='matrix'); 
            document.getElementById('nav-create').classList.toggle('active', t==='create');
        }

        function switchNavTab(t) {
            // If they click the "Deploy/New" button, clear the form so they don't accidentally edit
            if (t === 'create' && !editingTaskId) clearForm();
            if (t === 'matrix') clearForm(); 
            switchTabView(t);
        }

        initializeMatrix();
    </script>
</body>
</html>
